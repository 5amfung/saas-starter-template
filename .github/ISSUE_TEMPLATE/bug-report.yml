name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: A clear description of the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Auth
        - Workspace
        - Database
        - Routing
        - UI/Components
        - Email
        - Admin
        - Stripe/Billing
        - Other
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you seeing this?
      options:
        - Development (local)
        - Production build
        - Preview/staging
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: What version of Node.js are you using?
      placeholder: 'e.g., 22.x'
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other details that might help.
      placeholder: Screenshots, logs, error messages, etc.
    validations:
      required: false
